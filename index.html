  function getGreeting() {
    if (!state.userName) return 'Les meves notes';
    const h = new Date().getHours();
    let salutation;
    if (h >= 6 && h < 13) salutation = 'Bon dia';
    else if (h >= 13 && h < 20) salutation = 'Bona tarda';
    else salutation = 'Bona nit';
    return salutation + ', ' + state.userName;
  }

  function updateGreeting() {
    if (activePage === 'notes') {
      document.getElementById('page-title').textContent = getGreeting();
    }
  }

  window.switchPage = function(page) {
    activePage = page;
    document.getElementById('tab-notes').classList.toggle('active', page === 'notes');
    document.getElementById('tab-stats').classList.toggle('active', page === 'stats');
    document.getElementById('tab-calendar').classList.toggle('active', page === 'calendar');
    document.getElementById('notes-view').style.display = page === 'notes' ? '' : 'none';
    document.getElementById('stats-view').style.display = page === 'stats' ? '' : 'none';
    document.getElementById('calendar-view').style.display = page === 'calendar' ? '' : 'none';
    let title;
    if (page === 'notes') title = getGreeting();
    else if (page === 'stats') title = 'Estadístiques';
    else title = 'Calendari';
    document.getElementById('page-title').textContent = title;
    if (page === 'stats') renderStats();
    if (page === 'calendar') renderCalendar();
  };

  // ============ CALENDAR ============
  function renderCalendar() {
    const root = document.getElementById('calendar-content');
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

    const year = calendarMonth.getFullYear();
    const month = calendarMonth.getMonth();
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const startWeekday = (firstDay.getDay() + 6) % 7; // 0 = dilluns
    const daysInMonth = lastDay.getDate();

    // Comencem la graella des del dilluns abans del primer dia
    const gridStart = new Date(year, month, 1 - startWeekday);
    const cells = [];
    for (let i = 0; i < 42; i++) {
      const d = new Date(gridStart);
      d.setDate(gridStart.getDate() + i);
      cells.push(d);
    }

    // Organitzar events per data
    const eventsByDate = {};
    state.events.forEach(ev => {
      if (!eventsByDate[ev.date]) eventsByDate[ev.date] = [];
      eventsByDate[ev.date].push(ev);
    });

    const monthNames = ['Gener','Febrer','Març','Abril','Maig','Juny','Juliol','Agost','Setembre','Octubre','Novembre','Desembre'];
    const monthTitle = monthNames[month] + ' ' + year;

    let gridHtml = '';
    ['Dl','Dt','Dc','Dj','Dv','Ds','Dg'].forEach(d => {
      gridHtml += '<div class="cal-dow">' + d + '</div>';
    });

    cells.forEach(d => {
      const ds = d.toISOString().slice(0, 10);
      const isToday = d.getTime() === today.getTime();
      const otherMonth = d.getMonth() !== month;
      const events = eventsByDate[ds] || [];
      const dots = events.slice(0, 3).map(ev => '<div class="cal-day-dot" style="background:' + getEventType(ev.type).color + ';"></div>').join('');
      const more = events.length > 3 ? '<div class="cal-day-more">+' + (events.length - 3) + '</div>' : '';
      gridHtml += '<div class="cal-day ' + (otherMonth ? 'other-month ' : '') + (isToday ? 'today' : '') + '" onclick="openEventModal(\'' + ds + '\')">' +
        '<div class="cal-day-num">' + d.getDate() + '</div>' +
        '<div class="cal-day-events">' + dots + '</div>' +
        more +
      '</div>';
    });

    // Llista cronolgica
    const sortedEvents = [...state.events].sort((a, b) => a.date.localeCompare(b.date));
    const upcoming = sortedEvents.filter(ev => new Date(ev.date + 'T00:00:00') >= today);
    const past = sortedEvents.filter(ev => new Date(ev.date + 'T00:00:00') < today).reverse();

    function eventHtml(ev, isPast) {
      const evDate = new Date(ev.date + 'T00:00:00');
      const days = daysBetween(today, evDate);
      let countdownText, countdownCls = '';
      if (days === 0) { countdownText = 'AVUI'; countdownCls = 'today'; }
      else if (days > 0) {
        if (days <= 3) countdownCls = 'urgent';
        else if (days <= 7) countdownCls = 'soon';
        countdownText = 'en ' + days + ' d.';
      } else { countdownText = 'fa ' + Math.abs(days) + ' d.'; countdownCls = 'past'; }

      const type = getEventType(ev.type);
      const subject = ev.subjectId ? state.subjects.find(s => s.id === ev.subjectId) : null;
      const subjectLabel = subject ? (subject.sigla || subject.name || '') : '';

      const monthShort = ['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'][evDate.getMonth()];

      return '<div class="event-item ' + (isPast ? 'past' : '') + '" onclick="editEvent(\'' + ev.id + '\')">' +
        '<div class="event-color-bar" style="background:' + type.color + ';"></div>' +
        '<div class="event-date">' +
          '<div class="event-date-day">' + evDate.getDate() + '</div>' +
          '<div class="event-date-month">' + monthShort + '</div>' +
        '</div>' +
        '<div class="event-info">' +
          '<div class="event-title">' + escapeHtml(ev.title || type.label) + '</div>' +
          '<div class="event-subtitle">' +
            '<span class="event-type-pill" style="background:' + type.color + '22;color:' + type.color + ';">' + type.label + '</span>' +
            (subjectLabel ? '<span>· ' + escapeHtml(subjectLabel) + '</span>' : '') +
            (ev.time ? '<span>· ' + escapeHtml(ev.time) + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="event-countdown ' + countdownCls + '">' + countdownText + '</div>' +
      '</div>';
    }

    let listHtml = '<button class="event-add-btn" onclick="openEventModal()"><i class="ti ti-plus"></i>Afegir event</button>';
    if (upcoming.length > 0) {
      listHtml += '<div class="event-list-section">' +
        '<div class="event-list-title"><i class="ti ti-calendar-event"></i>Propers events (' + upcoming.length + ')</div>' +
        '<div class="event-list">' + upcoming.map(ev => eventHtml(ev, false)).join('') + '</div>' +
      '</div>';
    }
    if (past.length > 0) {
      listHtml += '<div class="event-list-section">' +
        '<div class="event-list-title"><i class="ti ti-history"></i>Passats (' + past.length + ')</div>' +
        '<div class="event-list">' + past.slice(0, 10).map(ev => eventHtml(ev, true)).join('') + '</div>' +
      '</div>';
    }
    if (upcoming.length === 0 && past.length === 0) {
      listHtml += '<div class="countdown-empty" style="padding:30px 0;">Encara no tens cap event. Afegeix el primer!</div>';
    }

    root.innerHTML = '<div class="calendar-layout">' +
      '<div class="calendar-panel">' +
        '<div class="cal-header">' +
          '<h3 class="cal-month-title">' + monthTitle + '</h3>' +
          '<div class="cal-nav">' +
            '<button onclick="calendarPrev()"><i class="ti ti-chevron-left"></i></button>' +
            '<button onclick="calendarToday()">Avui</button>' +
            '<button onclick="calendarNext()"><i class="ti ti-chevron-right"></i></button>' +
          '</div>' +
        '</div>' +
        '<div class="cal-grid">' + gridHtml + '</div>' +
      '</div>' +
      '<div class="calendar-panel">' + listHtml + '</div>' +
    '</div>';
  }

  window.calendarPrev = function() {
    calendarMonth.setMonth(calendarMonth.getMonth() - 1);
    renderCalendar();
  };
  window.calendarNext = function() {
    calendarMonth.setMonth(calendarMonth.getMonth() + 1);
    renderCalendar();
  };
  window.calendarToday = function() {
    calendarMonth = new Date();
    calendarMonth.setDate(1);
    renderCalendar();
  };

  let editingEventId = null;

  window.openEventModal = function(dateStr) {
    editingEventId = null;
    const today = new Date();
    const defaultDate = dateStr || today.toISOString().slice(0, 10);
    showEventModal({ id: '', title: '', type: 'examen', date: defaultDate, time: '', subjectId: '', description: '' });
  };

  window.editEvent = function(eventId) {
    const ev = state.events.find(e => e.id === eventId);
    if (!ev) return;
    editingEventId = eventId;
    showEventModal(ev);
  };

  function showEventModal(ev) {
    const root = document.getElementById('modal-root');
    const typeOptions = EVENT_TYPES.map(t =>
      '<option value="' + t.id + '"' + (t.id === ev.type ? ' selected' : '') + '>' + t.label + '</option>'
    ).join('');
    const subjectOptions = '<option value="">— Cap —</option>' + state.subjects.map(s =>
      '<option value="' + s.id + '"' + (s.id === ev.subjectId ? ' selected' : '') + '>' + escapeHtml((s.sigla || s.name || '') + (s.quatri ? ' (' + s.quatri + ')' : '')) + '</option>'
    ).join('');

    root.innerHTML =
      '<div class="modal-bg" onclick="if(event.target===this)closeEventModal()">' +
        '<div class="modal">' +
          '<h3>' + (editingEventId ? 'Editar event' : 'Nou event') + '</h3>' +
          '<div><label>Títol</label>' +
            '<input type="text" id="event-title" value="' + escapeHtml(ev.title || '') + '" placeholder="Ex. Examen final" /></div>' +
          '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
            '<div><label>Data</label><input type="date" id="event-date" value="' + ev.date + '" /></div>' +
            '<div><label>Hora (opcional)</label><input type="time" id="event-time" value="' + (ev.time || '') + '" /></div>' +
          '</div>' +
          '<div><label>Tipus</label><select id="event-type">' + typeOptions + '</select></div>' +
          '<div><label>Assignatura (opcional)</label><select id="event-subject">' + subjectOptions + '</select></div>' +
          '<div><label>Descripció (opcional)</label><input type="text" id="event-desc" value="' + escapeHtml(ev.description || '') + '" placeholder="Notes adicionals..." /></div>' +
          '<div class="modal-actions">' +
            (editingEventId ? '<button class="btn" onclick="deleteEvent()" style="color:#EF4444;border-color:#EF4444;">Eliminar</button>' : '<button class="btn" onclick="closeEventModal()">Cancel·lar</button>') +
            '<button class="btn btn-primary" onclick="saveEvent()">Desar</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  }

  window.saveEvent = function() {
    const title = document.getElementById('event-title').value.trim();
    const date = document.getElementById('event-date').value;
    const time = document.getElementById('event-time').value;
    const type = document.getElementById('event-type').value;
    const subjectId = document.getElementById('event-subject').value;
    const description = document.getElementById('event-desc').value.trim();
    if (!date) { alert('Posa una data'); return; }
    const ev = { id: editingEventId || genId(), title, date, time, type, subjectId, description };
    if (editingEventId) {
      const idx = state.events.findIndex(e => e.id === editingEventId);
      if (idx >= 0) state.events[idx] = ev;
    } else {
      state.events.push(ev);
    }
    save();
    closeEventModal();
    if (activePage === 'calendar') renderCalendar();
    if (activePage === 'notes') render();
  };

  window.deleteEvent = function() {
    if (!editingEventId) return;
    if (!confirm('Eliminar aquest event?')) return;
    state.events = state.events.filter(e => e.id !== editingEventId);
    save();
    closeEventModal();
    if (activePage === 'calendar') renderCalendar();
    if (activePage === 'notes') render();
  };

  window.closeEventModal = function() {
    document.getElementById('modal-root').innerHTML = '';
    editingEventId = null;
  };

  window.setStatsScope = function(scope) {
    activeStatsScope = scope;
    renderStats();
  };

  function renderStats() {
    const root = document.getElementById('stats-content');
    let filtered = getFiltered();
    if (activeStatsScope === 'passed') {
      filtered = filtered.filter(s => {
        const st = getStatus(s);
        return st.final && (st.type === 'pass' || st.type === 'compensable');
      });
    }

    if (state.subjects.length === 0) {
      root.innerHTML = '<div class="stats-empty"><i class="ti ti-chart-bar"></i>Encara no tens cap assignatura. Afegeix-ne per veure les estadístiques.</div>';
      return;
    }

    let toggleHtml = '<div style="grid-column:1/-1;display:flex;justify-content:flex-start;">' +
      '<div class="stats-toggle">' +
        '<button class="stats-toggle-btn ' + (activeStatsScope === 'all' ? 'active' : '') + '" onclick="setStatsScope(\'all\')">Totes les matrícules</button>' +
        '<button class="stats-toggle-btn ' + (activeStatsScope === 'passed' ? 'active' : '') + '" onclick="setStatsScope(\'passed\')">Només aprovades</button>' +
      '</div>' +
    '</div>';

    // Dades agregades del filtre actual
    let totalEcts = 0, passedEcts = 0;
    const finalGrades = [];
    const counts = { pass: 0, compensable: 0, fail: 0, pending: 0 };
    const histogram = [0, 0, 0, 0]; // 0-4, 4-5, 5-7, 7-10
    const allGraded = []; // {sigla, name, grade, color, status}

    filtered.forEach(s => {
      const ects = parseFloat(s.ects) || 0;
      totalEcts += ects;
      const g = calcGrade(s);
      const status = getStatus(s);
      if (status.final) {
        finalGrades.push(g);
        allGraded.push({ sigla: s.sigla || s.name || '', name: s.fullName || s.sigla || '', grade: g, color: getColor(s.color).bg, status: status.type, quatri: s.quatri });
        if (status.type === 'pass' || status.type === 'compensable') {
          counts[status.type]++;
          passedEcts += ects;
        } else {
          counts.fail++;
        }
        if (g < 4) histogram[0]++;
        else if (g < 5) histogram[1]++;
        else if (g < 7) histogram[2]++;
        else histogram[3]++;
      } else {
        counts.pending++;
      }
    });

    const avgFinal = finalGrades.length > 0 ? (finalGrades.reduce((a,b)=>a+b,0) / finalGrades.length) : null;

    // Carrer ECTS totals
    const career = state.career ? CAREERS.find(c => c.id === state.career) : null;
    const careerEcts = career ? career.totalEcts : 240;

    // Per quatri: agregar mitjana i ECTS acumulats (només si filter = ALL)
    const showByQuatri = activeFilter === 'ALL';
    let quatriData = [];
    if (showByQuatri) {
      const byQ = {};
      state.subjects.forEach(s => {
        const g = calcGrade(s);
        const st = getStatus(s);
        if (!st.final) return;
        if (!byQ[s.quatri]) byQ[s.quatri] = { grades: [], ects: 0, passedEcts: 0 };
        byQ[s.quatri].grades.push(g);
        const e = parseFloat(s.ects) || 0;
        byQ[s.quatri].ects += e;
        if (st.type === 'pass' || st.type === 'compensable') byQ[s.quatri].passedEcts += e;
      });
      // Ordenar per quatri (mes antic primer per acumulats)
      const sortedQuatris = Object.keys(byQ).sort((a,b) => QUATRIS.indexOf(b) - QUATRIS.indexOf(a));
      let acc = 0;
      sortedQuatris.forEach(q => {
        const d = byQ[q];
        const avg = d.grades.length > 0 ? (d.grades.reduce((a,b)=>a+b,0) / d.grades.length) : null;
        acc += d.passedEcts;
        quatriData.push({ quatri: q, avg, ects: d.ects, passedEcts: d.passedEcts, accEcts: acc });
      });
    }

    // Top 3 millors i pitjors
    const sortedGraded = [...allGraded].sort((a,b) => b.grade - a.grade);
    const top3 = sortedGraded.slice(0, 3);
    const bottom3 = sortedGraded.slice(-3).reverse();

    const totalSubjects = filtered.length;
    const fmtEcts = (n) => { const r = Math.round(n*10)/10; return r % 1 === 0 ? String(r) : r.toFixed(1); };

    // Cercle de progres ECTS de la carrera (no del filtre)
    // Agrupar per sigla per evitar doble compte
    const seenSiglasCar = new Set();
    let careerPassed = 0;
    state.subjects.forEach(s => {
      const sig = (s.sigla || s.name || '').trim().toUpperCase();
      if (sig && seenSiglasCar.has(sig)) return;
      if (sig) seenSiglasCar.add(sig);
      const contributor = sig ? getEctsContributor(sig) : null;
      const directOk = !sig && (() => { const st = getStatus(s); return st.final && (st.type === 'pass' || st.type === 'compensable'); })();
      if (contributor || directOk) careerPassed += parseFloat(s.ects) || 0;
    });
    const careerPct = Math.min(100, (careerPassed / careerEcts) * 100);
    const circR = 70;
    const circC = 2 * Math.PI * circR;
    const circOffset = circC - (circPct => (circPct / 100) * circC)(careerPct);

    // === HTML ===
    let html = toggleHtml;

    // 1. Cercle de progres (sempre tota la carrera)
    html += '<div class="stat-block span-4">' +
      '<div class="stat-block-header">' +
        '<h3 class="stat-block-title"><i class="ti ti-school"></i>Progrés de la carrera</h3>' +
      '</div>' +
      '<div class="progress-circle-wrap">' +
        '<div class="progress-circle">' +
          '<svg width="160" height="160">' +
            '<circle class="progress-circle-track" cx="80" cy="80" r="' + circR + '" stroke-width="12" />' +
            '<circle class="progress-circle-bar" cx="80" cy="80" r="' + circR + '" stroke-width="12" stroke-dasharray="' + circC + '" stroke-dashoffset="' + circOffset + '" />' +
          '</svg>' +
          '<div class="progress-circle-center">' +
            '<div class="progress-circle-value">' + Math.round(careerPct) + '%</div>' +
            '<div class="progress-circle-label">Aprovats</div>' +
            '<div class="progress-circle-sub">' + fmtEcts(careerPassed) + ' / ' + fmtEcts(careerEcts) + ' ECTS</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
      (career ? '<div class="stat-block-subtitle" style="text-align:center;">' + escapeHtml(career.name) + '</div>' :
        '<div class="stat-block-subtitle" style="text-align:center;">Tria la teva carrera per personalitzar</div>') +
    '</div>';

    // 2. Mitjana del filtre + numero d'assignatures
    html += '<div class="stat-block span-4">' +
      '<div class="stat-block-header">' +
        '<h3 class="stat-block-title"><i class="ti ti-chart-line"></i>Mitjana</h3>' +
        '<div class="stat-block-subtitle">' + (activeFilter === 'ALL' ? 'Tota la carrera' : activeFilter) + '</div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;gap:14px;flex:1;justify-content:center;">' +
        '<div class="big-number-row">' +
          '<div>' +
            '<div class="big-number" style="color:' + (avgFinal !== null && avgFinal >= 5 ? 'var(--accent)' : (avgFinal !== null ? '#EF4444' : 'var(--text-tertiary)')) + ';">' + (avgFinal !== null ? fmt(avgFinal) : '—') + '</div>' +
            '<div class="big-number-label">de ' + finalGrades.length + ' assignatures finalitzades</div>' +
          '</div>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
          '<div><div class="big-number" style="font-size:24px;">' + counts.pass + '</div><div class="big-number-label" style="color:var(--accent);">Aprovades</div></div>' +
          '<div><div class="big-number" style="font-size:24px;">' + counts.pending + '</div><div class="big-number-label" style="color:#F59E0B;">Pendents</div></div>' +
        '</div>' +
      '</div>' +
    '</div>';

    // 3. Donut d'estats
    const totalFinal = counts.pass + counts.compensable + counts.fail;
    const totalAll = totalFinal + counts.pending;
    html += '<div class="stat-block span-4">' +
      '<div class="stat-block-header">' +
        '<h3 class="stat-block-title"><i class="ti ti-chart-donut-2"></i>Estats</h3>' +
      '</div>';

    if (totalAll === 0) {
      html += '<div style="padding:20px;text-align:center;color:var(--text-tertiary);font-size:13px;">Sense dades</div>';
    } else {
      const donutR = 55;
      const donutC = 2 * Math.PI * donutR;
      let donutOffset = 0;
      const segments = [
        { val: counts.pass, color: '#0EBB80', label: 'Aprovades' },
        { val: counts.compensable, color: '#F59E0B', label: 'Compensables' },
        { val: counts.fail, color: '#EF4444', label: 'Suspeses' },
        { val: counts.pending, color: '#A1A1A6', label: 'Pendents' }
      ];
      let segmentsHtml = '';
      segments.forEach(seg => {
        if (seg.val === 0) return;
        const segLen = (seg.val / totalAll) * donutC;
        segmentsHtml += '<circle cx="70" cy="70" r="' + donutR + '" fill="none" stroke="' + seg.color + '" stroke-width="18" stroke-dasharray="' + segLen + ' ' + (donutC - segLen) + '" stroke-dashoffset="' + (-donutOffset) + '" style="transition:stroke-dasharray 1s ease-out;" />';
        donutOffset += segLen;
      });
      const legendHtml = segments.filter(s => s.val > 0).map(seg =>
        '<div class="donut-legend-item">' +
          '<div class="donut-legend-dot" style="background:' + seg.color + ';"></div>' +
          '<span class="donut-legend-label">' + seg.label + '</span>' +
          '<span class="donut-legend-value">' + seg.val + '</span>' +
        '</div>'
      ).join('');
      html += '<div class="donut-wrap">' +
        '<div class="donut">' +
          '<svg width="140" height="140">' + segmentsHtml + '</svg>' +
          '<div class="donut-center">' +
            '<div class="donut-center-value">' + totalAll + '</div>' +
            '<div class="donut-center-label">Assignatures</div>' +
          '</div>' +
        '</div>' +
        '<div class="donut-legend">' + legendHtml + '</div>' +
      '</div>';
    }
    html += '</div>';

    // 4. Histograma de notes (distribuci)
    const maxHisto = Math.max(...histogram, 1);
    html += '<div class="stat-block span-6">' +
      '<div class="stat-block-header">' +
        '<h3 class="stat-block-title"><i class="ti ti-chart-bar"></i>Distribució de notes</h3>' +
        '<div class="stat-block-subtitle">' + finalGrades.length + ' finalitzades</div>' +
      '</div>' +
      '<div class="histogram">' +
        histogram.map((v, i) => {
          const h = (v / maxHisto) * 100;
          return '<div class="histo-bar r' + (i+1) + '" style="height:' + h + '%;">' +
            (v > 0 ? '<div class="histo-value">' + v + '</div>' : '') +
            '</div>';
        }).join('') +
      '</div>' +
      '<div class="histo-labels">' +
        '<div class="histo-label">0–4</div>' +
        '<div class="histo-label">4–5</div>' +
        '<div class="histo-label">5–7</div>' +
        '<div class="histo-label">7–10</div>' +
      '</div>' +
    '</div>';

    // 5. Top millors i pitjors
    html += '<div class="stat-block span-6">' +
      '<div class="stat-block-header">' +
        '<h3 class="stat-block-title"><i class="ti ti-trophy"></i>Top notes</h3>' +
      '</div>';
    if (top3.length === 0) {
      html += '<div style="padding:16px;text-align:center;color:var(--text-tertiary);font-size:13px;">Cap assignatura finalitzada encara</div>';
    } else {
      html += '<div style="font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:-4px;">Millors</div>';
      html += '<div class="top-list">' +
        top3.map((it, i) => {
          const rankCls = i === 0 ? 'first' : (i === 1 ? 'second' : 'third');
          const gradeCls = it.status === 'pass' ? 'pass' : (it.status === 'compensable' ? 'warn' : 'fail');
          return '<div class="top-item">' +
            '<div class="top-rank ' + rankCls + '">' + (i+1) + '</div>' +
            '<div><div class="top-name">' + escapeHtml(it.sigla) + (it.name && it.name !== it.sigla ? ' — ' + escapeHtml(it.name) : '') + '</div>' +
            '<div class="top-meta">' + escapeHtml(it.quatri) + '</div></div>' +
            '<div class="top-grade ' + gradeCls + '">' + fmt(it.grade) + '</div>' +
          '</div>';
        }).join('') +
      '</div>';

      if (bottom3.length > 0 && allGraded.length > 3) {
        html += '<div style="font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-top:8px;margin-bottom:-4px;">Pitjors</div>';
        html += '<div class="top-list">' +
          bottom3.map(it => {
            const gradeCls = it.status === 'pass' ? 'pass' : (it.status === 'compensable' ? 'warn' : 'fail');
            return '<div class="top-item">' +
              '<div class="top-rank">•</div>' +
              '<div><div class="top-name">' + escapeHtml(it.sigla) + (it.name && it.name !== it.sigla ? ' — ' + escapeHtml(it.name) : '') + '</div>' +
              '<div class="top-meta">' + escapeHtml(it.quatri) + '</div></div>' +
              '<div class="top-grade ' + gradeCls + '">' + fmt(it.grade) + '</div>' +
            '</div>';
          }).join('') +
        '</div>';
      }
    }
    html += '</div>';

    // 6. Mitjana per quatri (nomes si activeFilter == ALL)
    if (showByQuatri && quatriData.length > 0) {
      const maxAvg = Math.max(...quatriData.map(q => q.avg || 0), 10);
      html += '<div class="stat-block span-6">' +
        '<div class="stat-block-header">' +
          '<h3 class="stat-block-title"><i class="ti ti-bar-3"></i>Mitjana per quatrimestre</h3>' +
        '</div>' +
        '<div class="v-bar-chart">' +
          quatriData.map(q => {
            const pct = q.avg !== null ? (q.avg / maxAvg) * 100 : 0;
            const cls = q.avg === null ? 'warn' : (q.avg >= 5 ? '' : 'fail');
            return '<div class="v-bar-col">' +
              '<div class="v-bar-track">' +
                '<div class="v-bar-fill ' + cls + '" style="height:' + pct + '%;">' +
                  (q.avg !== null ? '<div class="v-bar-value">' + fmt(q.avg) + '</div>' : '') +
                '</div>' +
              '</div>' +
              '<div class="v-bar-label">' + escapeHtml(q.quatri) + '</div>' +
            '</div>';
          }).join('') +
        '</div>' +
      '</div>';

      // 7. ECTS acumulats per quatri (linia)
      const maxAcc = Math.max(...quatriData.map(q => q.accEcts), 1);
      const w = 400, h = 140;
      const pad = { l: 30, r: 20, t: 20, b: 25 };
      const innerW = w - pad.l - pad.r;
      const innerH = h - pad.t - pad.b;
      let pathD = '', areaD = '', dotsHtml = '', labelsHtml = '', valuesHtml = '';
      quatriData.forEach((q, i) => {
        const x = pad.l + (quatriData.length === 1 ? innerW/2 : (i / (quatriData.length - 1)) * innerW);
        const y = pad.t + innerH - (q.accEcts / maxAcc) * innerH;
        pathD += (i === 0 ? 'M' : 'L') + x + ' ' + y + ' ';
        if (i === 0) areaD = 'M' + x + ' ' + (pad.t + innerH) + ' L' + x + ' ' + y;
        else areaD += ' L' + x + ' ' + y;
        if (i === quatriData.length - 1) areaD += ' L' + x + ' ' + (pad.t + innerH) + ' Z';
        dotsHtml += '<circle class="line-chart-dot" cx="' + x + '" cy="' + y + '" r="4"><title>' + q.quatri + ': ' + fmtEcts(q.accEcts) + ' ECTS</title></circle>';
        labelsHtml += '<text class="line-chart-label" x="' + x + '" y="' + (h - 5) + '">' + q.quatri + '</text>';
        valuesHtml += '<text class="line-chart-value" x="' + x + '" y="' + (y - 8) + '">' + fmtEcts(q.accEcts) + '</text>';
      });

      html += '<div class="stat-block span-6">' +
        '<div class="stat-block-header">' +
          '<h3 class="stat-block-title"><i class="ti ti-trending-up"></i>ECTS acumulats</h3>' +
          '<div class="stat-block-subtitle">' + fmtEcts(quatriData[quatriData.length-1].accEcts) + ' totals</div>' +
        '</div>' +
        '<div class="line-chart-wrap">' +
          '<svg class="line-chart-svg" viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
            '<defs><linearGradient id="area-gradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0EBB80" stop-opacity="0.4"/><stop offset="100%" stop-color="#0EBB80" stop-opacity="0"/></linearGradient></defs>' +
            '<path class="line-chart-area" d="' + areaD + '" />' +
            '<path class="line-chart-line" d="' + pathD + '" />' +
            dotsHtml +
            valuesHtml +
            labelsHtml +
          '</svg>' +
        '</div>' +
      '</div>';

      // 8. Linia de mitjana per quatri (evolució)
      const validAvgs = quatriData.filter(q => q.avg !== null);
      if (validAvgs.length > 0) {
        const lw = 460, lh = 200;
        const lpad = { l: 32, r: 16, t: 24, b: 28 };
        const linnerW = lw - lpad.l - lpad.r;
        const linnerH = lh - lpad.t - lpad.b;
        const maxY = 10, minY = 0;
        const yFor = v => lpad.t + linnerH - ((v - minY) / (maxY - minY)) * linnerH;
        // Linies grid horitzontals (0, 2.5, 5, 7.5, 10)
        let gridHtml = '';
        [0, 2.5, 5, 7.5, 10].forEach(v => {
          const y = yFor(v);
          gridHtml += '<line class="avg-line-grid" x1="' + lpad.l + '" x2="' + (lw - lpad.r) + '" y1="' + y + '" y2="' + y + '" />';
          gridHtml += '<text class="avg-line-grid-label" x="' + (lpad.l - 6) + '" y="' + (y + 3) + '" text-anchor="end">' + v + '</text>';
        });
        // Linia base del 5
        const y5 = yFor(5);
        // Punts
        let lPath = '', lArea = '', lDots = '', lValues = '', lLabels = '';
        quatriData.forEach((q, i) => {
          if (q.avg === null) return;
          const x = lpad.l + (quatriData.length === 1 ? linnerW/2 : (i / (quatriData.length - 1)) * linnerW);
          const y = yFor(q.avg);
          lPath += (lPath === '' ? 'M' : 'L') + x + ' ' + y + ' ';
          if (lArea === '') lArea = 'M' + x + ' ' + (lpad.t + linnerH) + ' L' + x + ' ' + y;
          else lArea += ' L' + x + ' ' + y;
          const dotCls = q.avg >= 5 ? '' : (q.avg >= 4 ? 'warn' : 'fail');
          lDots += '<circle class="avg-line-dot ' + dotCls + '" cx="' + x + '" cy="' + y + '" r="5"><title>' + q.quatri + ': ' + fmt(q.avg) + '</title></circle>';
          lValues += '<text class="avg-line-value" x="' + x + '" y="' + (y - 12) + '">' + fmt(q.avg) + '</text>';
        });
        // Tancar area al darrer punt
        quatriData.forEach((q, i) => {
          if (q.avg === null) return;
          const x = lpad.l + (quatriData.length === 1 ? linnerW/2 : (i / (quatriData.length - 1)) * linnerW);
          lLabels += '<text class="avg-line-label" x="' + x + '" y="' + (lh - 8) + '">' + q.quatri + '</text>';
        });
        // Cerrar el area
        const lastValid = [...quatriData].reverse().findIndex(q => q.avg !== null);
        if (lastValid !== -1) {
          const lastIdx = quatriData.length - 1 - lastValid;
          const lastX = lpad.l + (quatriData.length === 1 ? linnerW/2 : (lastIdx / (quatriData.length - 1)) * linnerW);
          lArea += ' L' + lastX + ' ' + (lpad.t + linnerH) + ' Z';
        }

        // Trend (puja/baixa)
        let trendBadge = '';
        if (validAvgs.length >= 2) {
          const last = validAvgs[validAvgs.length - 1].avg;
          const prev = validAvgs[validAvgs.length - 2].avg;
          const diff = last - prev;
          if (Math.abs(diff) >= 0.05) {
            const color = diff > 0 ? 'var(--accent)' : '#EF4444';
            const icon = diff > 0 ? 'ti-trending-up' : 'ti-trending-down';
            const sign = diff > 0 ? '+' : '';
            trendBadge = '<div class="stat-block-subtitle" style="color:' + color + ';display:inline-flex;align-items:center;gap:4px;font-weight:700;"><i class="ti ' + icon + '"></i>' + sign + fmt(diff) + '</div>';
          }
        }

        html += '<div class="stat-block span-6">' +
          '<div class="stat-block-header">' +
            '<h3 class="stat-block-title"><i class="ti ti-chart-line"></i>Evolució de la mitjana</h3>' +
            trendBadge +
          '</div>' +
          '<div class="avg-line-wrap">' +
            '<svg class="avg-line-svg" viewBox="0 0 ' + lw + ' ' + lh + '" preserveAspectRatio="none">' +
              '<defs><linearGradient id="avg-area-gradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#0EBB80" stop-opacity="0.5"/><stop offset="100%" stop-color="#0EBB80" stop-opacity="0"/></linearGradient></defs>' +
              gridHtml +
              '<line class="avg-line-baseline" x1="' + lpad.l + '" x2="' + (lw - lpad.r) + '" y1="' + y5 + '" y2="' + y5 + '" />' +
              '<path class="avg-line-fill" d="' + lArea + '" />' +
              '<path class="avg-line-path" d="' + lPath + '" />' +
              lDots + lValues + lLabels +
            '</svg>' +
          '</div>' +
        '</div>';
      }

      // 9. Heatmap per any acadèmic / quatri
      // Agrupar quatris per any acadèmic: "23-24" -> [Q1, Q2]
      const heatByYear = {};
      Object.keys(quatriData.reduce((acc, q) => (acc[q.quatri]=q, acc), {})).forEach(qLabel => {
        const m = qLabel.match(/^(\d{2}-\d{2}) (Q[12])$/);
        if (!m) return;
        const year = m[1], qpart = m[2];
        if (!heatByYear[year]) heatByYear[year] = { Q1: null, Q2: null };
        const qd = quatriData.find(x => x.quatri === qLabel);
        heatByYear[year][qpart] = qd ? qd.avg : null;
      });
      const years = Object.keys(heatByYear).sort();
      if (years.length > 0) {
        // Color per nota: gradient roig (0) -> groc (5) -> verd (10)
        function colorForGrade(g) {
          if (g === null) return null;
          // Clamp 0-10
          const v = Math.max(0, Math.min(10, g));
          let r, gn, b;
          if (v < 5) {
            // roig -> groc
            const t = v / 5;
            r = 239; gn = Math.round(68 + (179 - 68) * t); b = Math.round(68 + (24 - 68) * t);
          } else {
            // groc -> verd
            const t = (v - 5) / 5;
            r = Math.round(245 + (14 - 245) * t); gn = Math.round(158 + (187 - 158) * t); b = Math.round(11 + (128 - 11) * t);
          }
          return 'rgb(' + r + ',' + gn + ',' + b + ')';
        }

        let heatRows = '';
        years.forEach(year => {
          let cellsHtml = '';
          ['Q1', 'Q2'].forEach(q => {
            const v = heatByYear[year][q];
            if (v === null) {
              cellsHtml += '<div class="heatmap-cell heatmap-cell-empty" title="' + year + ' ' + q + ': sense dades"><div class="heatmap-cell-q">' + q + '</div><div class="heatmap-cell-val">—</div></div>';
            } else {
              const bg = colorForGrade(v);
              cellsHtml += '<div class="heatmap-cell" style="background:' + bg + ';color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.2);" title="' + year + ' ' + q + ': ' + fmt(v) + '"><div class="heatmap-cell-q">' + q + '</div><div class="heatmap-cell-val">' + fmt(v) + '</div></div>';
            }
          });
          heatRows += '<div class="heatmap-row">' +
            '<div class="heatmap-year-label">' + year + '</div>' +
            '<div class="heatmap-cells">' + cellsHtml + '</div>' +
          '</div>';
        });

        // Llegenda
        const legendSteps = [0, 2.5, 5, 7.5, 10];
        let legendBar = '<div class="heatmap-legend-bar">';
        for (let i = 0; i < 20; i++) {
          legendBar += '<div style="background:' + colorForGrade((i / 19) * 10) + ';"></div>';
        }
        legendBar += '</div>';

        html += '<div class="stat-block span-12">' +
          '<div class="stat-block-header">' +
            '<h3 class="stat-block-title"><i class="ti ti-grid-dots"></i>Mapa de calor per quatrimestre</h3>' +
            '<div class="stat-block-subtitle">' + years.length + ' anys acadèmics</div>' +
          '</div>' +
          '<div class="heatmap">' + heatRows + '</div>' +
          '<div class="heatmap-legend">' +
            '<span>0</span>' + legendBar + '<span>10</span>' +
          '</div>' +
        '</div>';
      }
    }

    root.innerHTML = html;
  }

  loadTheme();
  load();
  setLogo();
  renderCareerTag();
  updateGreeting();
  renderFilters();
  render();
})();
</script>
</body>
</html>
