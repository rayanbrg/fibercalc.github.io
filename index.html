<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FiberCalc</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
  <link rel="icon" type="image/jpeg" href="logo-fibercalc.jpeg">
  <link rel="apple-touch-icon" href="logo-fibercalc.jpeg">
<style>
* { box-sizing: border-box; }
:root {
  --accent: #0EBB80;
  --accent-dark: #0A9466;
  --accent-soft: #DCF6EC;
  --bg: #F4F5F8;
  --surface: #FFFFFF;
  --surface-elev: #F9FAFC;
  --text-primary: #0B0E14;
  --text-secondary: #5A6173;
  --text-tertiary: #9CA3AE;
  --border: rgba(11,14,20,0.08);
  --border-strong: rgba(11,14,20,0.16);
  --shadow: 0 1px 3px rgba(11,14,20,0.05), 0 1px 2px rgba(11,14,20,0.04);
  --shadow-hover: 0 6px 16px rgba(11,14,20,0.08);
  --shadow-modal: 0 20px 50px rgba(11,14,20,0.18);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --pass-bg: #D9F5E6;
  --pass-text: #064E36;
  --fail-bg: #FBE2E2;
  --fail-text: #6B1818;
  --warn-bg: #FBEDD3;
  --warn-text: #4A2C04;
  --compensable-bg: #FEE9B8;
  --compensable-text: #78350F;
  --header-grad: linear-gradient(135deg, #0EBB80 0%, #14D49A 100%);
}
[data-theme="dark"] {
  --bg: #0A1224;
  --surface: #16213C;
  --surface-elev: #1F2D4A;
  --text-primary: #F1F5F9;
  --text-secondary: #94A3B8;
  --text-tertiary: #64748B;
  --border: rgba(255,255,255,0.10);
  --border-strong: rgba(255,255,255,0.20);
  --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.4);
  --shadow-modal: 0 20px 60px rgba(0,0,0,0.5);
  --pass-bg: #0A4D38;
  --pass-text: #6EE7B7;
  --fail-bg: #4A1717;
  --fail-text: #FCA5A5;
  --warn-bg: #4A2F0A;
  --warn-text: #FCD34D;
  --compensable-bg: #3F2A0A;
  --compensable-text: #FBBF24;
  --accent-soft: rgba(14, 187, 128, 0.18);
  --header-grad: linear-gradient(135deg, #0A9466 0%, #0EBB80 50%, #14D49A 100%);
}
body { margin: 0; background: var(--bg); color: var(--text-primary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-weight: 400; -webkit-font-smoothing: antialiased; min-height: 100vh; transition: background 0.3s, color 0.3s; }
.container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1.5rem 2rem; }
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; flex-wrap: wrap; background: var(--header-grad); padding: 14px 18px; border-radius: var(--radius-lg); box-shadow: var(--shadow); }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { height: 42px; width: 42px; object-fit: contain; border-radius: 10px; background: rgba(255,255,255,0.95); padding: 3px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.brand-name { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: -0.02em; color: #FFFFFF; }
.brand-name .accent { color: #FFFFFF; opacity: 0.85; }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.btn-add { background: #FFFFFF; color: var(--accent-dark); border: none; border-radius: var(--radius-md); padding: 10px 18px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s, transform 0.1s, background 0.15s, box-shadow 0.15s; font-family: inherit; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.btn-add:hover { background: #F4F5F8; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
.btn-add:active { transform: scale(0.97); }
.btn-add i { font-size: 16px; }
.icon-action { background: rgba(255,255,255,0.18); color: #FFFFFF; border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius-md); padding: 10px 12px; font-size: 16px; cursor: pointer; display: flex; align-items: center; transition: background 0.15s, transform 0.1s, border-color 0.15s; backdrop-filter: blur(8px); }
.icon-action:hover { background: rgba(255,255,255,0.28); }
.icon-action.active { background: #FFFFFF; color: var(--accent-dark); border-color: #FFFFFF; }
.icon-action:active { transform: scale(0.95); }
.header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; flex-wrap: wrap; }
.title { font-size: 28px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
.subtitle { font-size: 14px; color: var(--text-secondary); margin: 6px 0 0; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.career-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; background: var(--accent-soft); color: var(--accent-dark); border-radius: 999px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.15s; border: 1px solid transparent; }
.career-tag:hover { background: var(--accent); color: #fff; }
.career-tag i { font-size: 14px; }
[data-theme="dark"] .career-tag { color: #6EE7B7; }
[data-theme="dark"] .career-tag:hover { background: var(--accent); color: #fff; }
.dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; display: flex; flex-direction: column; gap: 4px; transition: transform 0.15s, box-shadow 0.15s; box-shadow: var(--shadow); }
.metric-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
.metric-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; display: flex; align-items: center; gap: 6px; }
.metric-label i { font-size: 14px; }
.metric-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1.1; }
.metric-subvalue { font-size: 12px; color: var(--text-tertiary); font-weight: 500; }
.metric-card.accent-pass .metric-value { color: var(--accent); }
.metric-card.accent-warn .metric-value { color: #F59E0B; }
.metric-card.accent-fail .metric-value { color: #EF4444; }
.filter-bar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; overflow-x: auto; padding-bottom: 4px; }
.filter-chip { background: var(--surface); color: var(--text-secondary); border: 1px solid var(--border); border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; white-space: nowrap; font-family: inherit; }
.filter-chip:hover { background: var(--bg); color: var(--text-primary); }
.filter-chip.active { background: var(--text-primary); color: var(--surface); border-color: var(--text-primary); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 18px; align-items: start; }
.card { background: var(--surface); border-radius: var(--radius-lg); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative; }
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-hover); }
.card.passed-anim::before { content: ''; position: absolute; top: 0; left: -100%; width: 60%; height: 100%; background: linear-gradient(90deg, transparent, rgba(14, 187, 128, 0.5), transparent); animation: shineSweep 1.1s ease-out; z-index: 2; pointer-events: none; }
.card.passed-anim { animation: passPulse 0.9s ease-out; }
.card.failed-anim { animation: failPulse 1.2s ease-out; }
@keyframes shineSweep { 0% { left: -100%; } 100% { left: 200%; } }
@keyframes passPulse {
  0% { transform: scale(1); box-shadow: var(--shadow); }
  30% { transform: scale(1.05); box-shadow: 0 0 0 8px rgba(14, 187, 128, 0.4), 0 8px 24px rgba(14, 187, 128, 0.3); }
  60% { transform: scale(1.02); box-shadow: 0 0 0 4px rgba(14, 187, 128, 0.2), var(--shadow-hover); }
  100% { transform: scale(1); box-shadow: var(--shadow); }
}
@keyframes failPulse {
  0% { transform: scale(1); box-shadow: var(--shadow); }
  20% { transform: scale(1.03); box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.35), 0 8px 24px rgba(239, 68, 68, 0.25); }
  40% { transform: scale(1); box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.25), var(--shadow); }
  60% { transform: scale(1.02); box-shadow: 0 0 0 6px rgba(239, 68, 68, 0.3), var(--shadow-hover); }
  80% { transform: scale(1); box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15), var(--shadow); }
  100% { transform: scale(1); box-shadow: var(--shadow); }
}
.card.reorder-mode { cursor: grab; }
.card.reorder-mode:active { cursor: grabbing; }
.card.dragging { opacity: 0.5; transform: scale(0.98); }
.card.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
.card-banner { padding: 16px 20px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; position: relative; }

.card-header-text { display: flex; flex-direction: row; align-items: center; gap: 10px; flex: 1; min-width: 0; flex-wrap: wrap; }
.card-name { font-size: 26px; font-weight: 800; margin: 0; letter-spacing: -0.02em; text-transform: uppercase; line-height: 1.05; }
.card-quatri { font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.95); background: rgba(0,0,0,0.22); padding: 3px 8px; border-radius: 6px; letter-spacing: 0.03em; flex-shrink: 0; }
.card-matricula { font-size: 10.5px; font-weight: 700; color: rgba(255,255,255,0.98); background: rgba(255,255,255,0.18); padding: 3px 8px; border-radius: 6px; letter-spacing: 0.03em; flex-shrink: 0; display: inline-flex; align-items: center; gap: 4px; border: 1px solid rgba(255,255,255,0.25); }
.card-matricula i { font-size: 12px; }
.card-matricula.first { display: none; }
.card.expanded .card-matricula.first { display: inline-flex; opacity: 0.7; }
.card-grade { font-size: 32px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; line-height: 1; flex-shrink: 0; }
.card-badge { width: 100%; padding: 8px 14px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 5px; text-align: center; }
.card-badge i { font-size: 14px; }
.badge-pass { background: var(--pass-bg); color: var(--pass-text); }
.badge-fail { background: var(--fail-bg); color: var(--fail-text); }
.badge-compensable { background: var(--compensable-bg); color: var(--compensable-text); }
.collapsed-parts { padding: 10px 14px 14px; display: flex; gap: 6px; flex-wrap: nowrap; background: var(--surface); align-items: center; overflow: hidden; max-height: 76px; }
.collapsed-part { background: var(--bg); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 2px; transition: background 0.15s; flex: 1 1 0; min-width: 0; height: 48px !important; max-height: 48px !important; min-height: 48px !important; overflow: hidden; box-sizing: border-box; }
.collapsed-part-name { font-size: 11px; color: var(--text-secondary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
.collapsed-part-grade { font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--text-primary); }
.collapsed-part.empty .collapsed-part-grade { color: var(--text-tertiary); font-weight: 600; font-size: 16px; }
.collapsed-more { background: transparent; border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 2px; flex: 1 1 0; min-width: 0; height: 48px !important; max-height: 48px !important; min-height: 48px !important; overflow: hidden; box-sizing: border-box; color: var(--text-tertiary); font-size: 11px; font-weight: 600; }
.collapsed-more strong { display: block; font-size: 14px; font-weight: 700; color: var(--text-secondary); margin-top: 1px; }
.card-body { padding: 0 20px 18px; display: none; flex-direction: column; gap: 14px; background: var(--surface); }
.card.expanded .card-body { display: flex; padding: 4px 20px 18px; }
.card.expanded .card-header-text { flex-direction: column; gap: 6px; align-items: flex-start; }
.card.expanded .collapsed-parts { display: none; }
.parts { display: flex; flex-direction: column; gap: 10px; }
.part { display: grid; grid-template-columns: 1fr 80px 50px; gap: 10px; align-items: center; font-size: 13.5px; }
.part-name { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
.input-wrapper { position: relative; }
.part input { height: 34px; font-size: 14px; padding: 0 8px; text-align: center; font-variant-numeric: tabular-nums; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-primary); font-family: inherit; outline: none; transition: border-color 0.15s, box-shadow 0.15s; width: 100%; font-weight: 500; }
.part input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.ghost-hint { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 13.5px; color: var(--text-tertiary); opacity: 0.5; pointer-events: none; font-variant-numeric: tabular-nums; font-weight: 500; font-style: italic; }
.part input:not(:placeholder-shown) ~ .ghost-hint, .part input:focus ~ .ghost-hint { display: none; }
.part-weight { text-align: right; color: var(--text-tertiary); font-variant-numeric: tabular-nums; font-size: 12px; font-weight: 500; }
.status-pill { font-size: 13px; padding: 10px 14px; border-radius: var(--radius-md); line-height: 1.45; display: flex; align-items: center; gap: 8px; font-weight: 500; }
.status-pill strong { font-weight: 700; font-variant-numeric: tabular-nums; }
.status-pass { background: var(--pass-bg); color: var(--pass-text); }
.status-fail { background: var(--fail-bg); color: var(--fail-text); }
.status-warn { background: var(--warn-bg); color: var(--warn-text); }
.status-compensable { background: var(--compensable-bg); color: var(--compensable-text); }
.card-details { display: flex; flex-direction: column; }
.detail-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 12.5px; color: var(--text-secondary); border-top: 1px solid var(--border); }
.detail-row strong { color: var(--text-primary); font-weight: 600; font-variant-numeric: tabular-nums; }
.card-actions { display: flex; gap: 4px; justify-content: flex-end; }
.icon-btn { background: transparent; border: none; cursor: pointer; color: var(--text-tertiary); padding: 6px 8px; border-radius: var(--radius-sm); display: inline-flex; align-items: center; font-size: 16px; transition: color 0.15s, background 0.15s; }
.icon-btn:hover { color: var(--text-primary); background: var(--bg); }
.grid-empty { text-align: center; padding: 4rem 1rem; color: var(--text-secondary); font-size: 15px; grid-column: 1/-1; }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; width: min(100%, 460px); display: flex; flex-direction: column; gap: 16px; box-shadow: var(--shadow-modal); max-height: 90vh; overflow-y: auto; animation: slideUp 0.25s ease; }
@keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal h3 { margin: 0; font-size: 18px; font-weight: 600; }
.modal label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; font-weight: 500; }
.modal input[type="text"], .modal input[type="number"], .modal select { width: 100%; height: 38px; font-size: 14px; padding: 0 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text-primary); font-family: inherit; outline: none; transition: border-color 0.15s; }
.modal input:focus, .modal select:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
.parts-edit { display: flex; flex-direction: column; gap: 8px; max-height: 240px; overflow-y: auto; padding: 2px; }
.part-edit { display: grid; grid-template-columns: 1fr 80px 32px; gap: 8px; align-items: center; }
.part-edit input { height: 34px; }
.color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
.color-swatch { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: transform 0.15s, border-color 0.15s; }
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.selected { border-color: var(--text-primary); transform: scale(1.12); }
.color-swatch.custom { background: linear-gradient(135deg, #FF5E5E 0%, #FFA500 25%, #FFE66D 50%, #06D6A0 75%, #118AB2 100%); position: relative; }
.color-swatch.custom::after { content: '+'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #FFFFFF; font-size: 20px; font-weight: 700; text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
.color-custom-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding: 8px 10px; background: var(--bg); border-radius: var(--radius-sm); }
.color-custom-row input[type="color"] { width: 36px; height: 36px; border: none; padding: 0; background: transparent; cursor: pointer; border-radius: 6px; }
.color-custom-row label { margin: 0; font-size: 13px; color: var(--text-secondary); }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 6px; }
.career-modal-list { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
.career-option { padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; transition: background 0.15s, border-color 0.15s; }
.career-option:hover { background: var(--bg); border-color: var(--border-strong); }
.career-option.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent-dark); font-weight: 600; }
[data-theme="dark"] .career-option.selected { color: #6EE7B7; }
.btn { background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-md); padding: 10px 18px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-primary); font-family: inherit; transition: background 0.15s; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
.btn-ghost { background: transparent; border: none; color: var(--text-secondary); font-size: 13px; cursor: pointer; padding: 6px 10px; display: inline-flex; align-items: center; gap: 4px; font-family: inherit; font-weight: 500; border-radius: var(--radius-sm); transition: color 0.15s, background 0.15s; }
.btn-ghost:hover { color: var(--text-primary); background: var(--bg); }
.warn { font-size: 12px; color: var(--warn-text); background: var(--warn-bg); padding: 8px 12px; border-radius: var(--radius-md); margin-top: 8px; }
.eval-tabs { display: flex; gap: 4px; flex-wrap: wrap; padding: 4px; background: var(--bg); border-radius: var(--radius-md); }
.eval-tab { background: transparent; color: var(--text-secondary); border: none; border-radius: var(--radius-sm); padding: 6px 10px; font-size: 12.5px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; transition: background 0.15s, color 0.15s; }
.eval-tab:hover { background: var(--surface); color: var(--text-primary); }
.eval-tab.active { background: var(--surface); color: var(--text-primary); box-shadow: var(--shadow); font-weight: 600; }
.eval-tab-name { line-height: 1; }
.eval-tab-del { display: inline-flex; align-items: center; opacity: 0.5; transition: opacity 0.15s; padding: 1px; border-radius: 3px; }
.eval-tab-del:hover { opacity: 1; background: rgba(0,0,0,0.1); }
.eval-tab-del i { font-size: 13px; }
.eval-tab-add { background: transparent; border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); padding: 6px 8px; font-size: 13px; color: var(--text-tertiary); cursor: pointer; display: inline-flex; align-items: center; transition: color 0.15s, border-color 0.15s; font-family: inherit; }
.eval-tab-add:hover { color: var(--text-primary); border-color: var(--text-primary); }
.eval-name-row { display: flex; flex-direction: column; }
.eval-selector { padding: 8px 14px 0; display: flex; align-items: center; gap: 8px; background: var(--surface); }
.eval-selector label { font-size: 12px; color: var(--text-secondary); display: inline-flex; align-items: center; gap: 4px; font-weight: 500; margin: 0; }
.eval-selector label i { font-size: 14px; }
.eval-selector select { flex: 1; height: 30px; font-size: 12.5px; padding: 0 8px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text-primary); font-family: inherit; font-weight: 500; cursor: pointer; outline: none; transition: border-color 0.15s; }
.eval-selector select:hover { border-color: var(--border-strong); }
.eval-selector select:focus { border-color: var(--accent); }
.stats { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
.stat { background: var(--surface); padding: 8px 14px; border-radius: var(--radius-md); font-size: 13px; color: var(--text-secondary); box-shadow: var(--shadow); }
.stat strong { font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-primary); }

<div class="container">

  </div>

<script>
(function() {
  const STORAGE_KEY = 'fibercalc-data';
  const THEME_KEY = 'fibercalc-theme';
  const FILTER_KEY = 'fibercalc-filter';
  const PALETTE = [
    { name: 'purple', bg: '#A78BFA' },
    { name: 'teal',   bg: '#14B8A6' },
    { name: 'coral',  bg: '#FB7185' },
    { name: 'pink',   bg: '#EC4899' },
    { name: 'blue',   bg: '#3B82F6' },
    { name: 'green',  bg: '#22C55E' },
    { name: 'amber',  bg: '#F59E0B' },
    { name: 'red',    bg: '#EF4444' },
    { name: 'indigo', bg: '#6366F1' },
    { name: 'cyan',   bg: '#06B6D4' }
  ];
  const QUATRIS = [
    '26-27 Q2', '26-27 Q1',
    '25-26 Q2', '25-26 Q1',
    '24-25 Q2', '24-25 Q1',

  const CAREERS = [
    { id: 'gei', name: 'Grau en Enginyeria Informàtica', short: 'GEI', school: 'FIB - UPC', totalEcts: 240 },

    { id: 'gia', name: 'Grau en Intel·ligència Artificial', short: 'GIA', school: 'FIB - UPC', totalEcts: 240 },
    { id: 'gem', name: 'Grau en Enginyeria Matemàtica en la Ciència de Dades', short: 'GEMCD', school: 'FIB - UPC', totalEcts: 240 },
    { id: 'other', name: 'Altres', short: 'Altres', school: '', totalEcts: 240 }
  ];
  let activePage = 'notes';
  let calendarMonth = new Date();
  calendarMonth.setDate(1);
  const EVENT_TYPES = [
    { id: 'examen', label: 'Examen', color: '#EF4444' },
    { id: 'parcial', label: 'Parcial', color: '#F87171' },
    { id: 'lab', label: 'Entrega lab', color: '#22C55E' },

    { id: 'treball', label: 'Treball', color: '#3B82F6' },
    { id: 'altres', label: 'Altres', color: '#6E6E73' }
  ];
  function getEventType(id) { return EVENT_TYPES.find(t => t.id === id) || EVENT_TYPES[6]; }
  function daysBetween(d1, d2) {
    const a = new Date(d1.getFullYear(), d1.getMonth(), d1.getDate());
    const b = new Date(d2.getFullYear(), d2.getMonth(), d2.getDate());
    return Math.round((b - a) / 86400000);
  }
  function fmtDate(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return d.getDate() + ' ' + ['gen','feb','mar','abr','mai','jun','jul','ago','set','oct','nov','des'][d.getMonth()] + ' ' + d.getFullYear();
  }
  let activeStatsScope = 'all'; // 'all' o 'passed'
  let state = { subjects: [] };
  let editingId = null;
  let draft = null;
  let expandedId = null;
  let prevStatus = {}; // 'pass' | 'fail' | 'compensable' | 'none'
  let firstRender = true;
  let activeFilter = 'ALL';
  let reorderMode = false;
  let dragSrcId = null;

  function load() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) state = JSON.parse(raw);
    } catch (e) { state = { subjects: [], career: null }; }
    if (!state.subjects) state.subjects = [];
    if (state.career === undefined) state.career = null;
    if (state.userName === undefined) state.userName = '';
    if (!state.events) state.events = [];
    state.subjects.forEach(s => {
      if (!s.quatri) s.quatri = '25-26 Q2';
      if (s.ects === undefined || s.ects === null) s.ects = 6;
      // Migracio: si te .name pero no .sigla, el .name passa a .sigla
      if (s.name && !s.sigla) { s.sigla = s.name; s.fullName = ''; delete s.name; }
      if (!s.sigla && s.name) { s.sigla = s.name; }
      if (s.fullName === undefined) s.fullName = '';
      if (!s.evaluations) {
        const evalId = genId();
        s.evaluations = [{ id: evalId, name: 'Avaluació', parts: s.parts || [] }];
        s.activeEval = evalId;
        delete s.parts;
      }
      if (!s.activeEval && s.evaluations.length > 0) {
        s.activeEval = s.evaluations[0].id;
      }
    });
    activeFilter = localStorage.getItem(FILTER_KEY) || 'ALL';
  }
  function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }
  function saveFilter() { try { localStorage.setItem(FILTER_KEY, activeFilter); } catch(e) {} }
  function genId() { return Math.random().toString(36).slice(2, 10); }
  function fmt(n) { return (Math.round(n * 100) / 100).toFixed(2); }
  function getColor(name) {
    const found = PALETTE.find(p => p.name === name);
    if (found) return found;
    // Si comena per # ᅵs un color hex personalitzat
    if (typeof name === 'string' && name.startsWith('#')) return { name: name, bg: name };
    return PALETTE[0];
  }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function parseNum(v) {
    if (v === null || v === undefined || v === '') return null;
    const s = String(v).replace(',', '.');
    const n = parseFloat(s);
    return isNaN(n) ? null : n;
  }

  function loadTheme() {
    const t = localStorage.getItem(THEME_KEY) || 'light';
    document.documentElement.setAttribute('data-theme', t);
    updateThemeIcon(t);
  }
  function updateThemeIcon(theme) {
    const icon = document.getElementById('theme-icon');
    if (icon) icon.className = theme === 'dark' ? 'ti ti-sun' : 'ti ti-moon';
  }
  function renderCareerTag() {
    const root = document.getElementById('career-tag-root');
    if (!root) return;
    if (!state.career) {
      root.innerHTML = '<span class="career-tag" onclick="openCareerModal()"><i class="ti ti-school"></i>Tria la teva carrera</span>';
    } else {
      const c = CAREERS.find(x => x.id === state.career);
      const label = c ? (c.short + (c.school ? ' · ' + c.school : '')) : 'Carrera';
      root.innerHTML = '<span class="career-tag" onclick="openCareerModal()"><i class="ti ti-school"></i>' + escapeHtml(label) + '</span>';
    }
  }

  window.openCareerModal = function() {
    const root = document.getElementById('modal-root');
    const optionsHtml = CAREERS.map(c => {
      const cls = c.id === state.career ? 'career-option selected' : 'career-option';
      return '<div class="' + cls + '" onclick="selectCareer(\'' + c.id + '\')"><strong>' + escapeHtml(c.short) + '</strong> — ' + escapeHtml(c.name) + (c.school ? ' <span style="color:var(--text-tertiary);font-size:12px;">(' + escapeHtml(c.school) + ')</span>' : '') + '</div>';
    }).join('');
    root.innerHTML =
      '<div class="modal-bg" onclick="if(event.target===this)closeCareerModal()">' +
        '<div class="modal">' +
          '<h3>El teu perfil</h3>' +
          '<div><label>Com et dius?</label>' +
            '<input type="text" id="modal-username" value="' + escapeHtml(state.userName || '') + '" placeholder="El teu nom" /></div>' +
          '<div><label>Carrera</label></div>' +
          '<div class="career-modal-list">' + optionsHtml + '</div>' +
          '<div class="modal-actions">' +
            '<button class="btn" onclick="closeCareerModal()">Cancel·lar</button>' +
            '<button class="btn btn-primary" onclick="saveCareerModal()">Desar</button>' +
          '</div>' +
        '</div>' +
      '</div>';
  };

  window.saveCareerModal = function() {
    const u = document.getElementById('modal-username');
    if (u) state.userName = u.value.trim();
    save();
    closeCareerModal();
    renderCareerTag();
    updateGreeting();
  };

  window.selectCareer = function(id) {
    state.career = id;
    // Capturar el nom abans de re-renderitzar
    const u = document.getElementById('modal-username');
    if (u) state.userName = u.value.trim();
    // Re-renderitzar el modal per mostrar la nova seleccio
    openCareerModal();
  };

  window.closeCareerModal = function() {
    document.getElementById('modal-root').innerHTML = '';
  };

  window.toggleTheme = function() {
    const cur = document.documentElement.getAttribute('data-theme') || 'light';
    const next = cur === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem(THEME_KEY, next);
    updateThemeIcon(next);
  };

  function getActiveEval(subject) {
    if (!subject.evaluations || subject.evaluations.length === 0) return null;
    return subject.evaluations.find(e => e.id === subject.activeEval) || subject.evaluations[0];
  }
  function getActiveParts(subject) {
    const ev = getActiveEval(subject);
    return ev ? ev.parts : [];
  }
  function calcGrade(subject) {
    let total = 0, hasAny = false;
    const parts = getActiveParts(subject);
    for (const p of parts) {
      if (p.grade !== null && p.grade !== undefined && p.grade !== '') {
        total += (parseFloat(p.grade) * parseFloat(p.weight)) / 100;
        hasAny = true;
      }
    }
    return hasAny ? total : null;
  }

  function calcNeededPerPart(subject) {
    let earned = 0, remainingWeight = 0;
    const parts = getActiveParts(subject);
    for (const p of parts) {
      const w = parseFloat(p.weight) || 0;
      if (p.grade !== null && p.grade !== undefined && p.grade !== '') {
        earned += (parseFloat(p.grade) * w) / 100;
      } else {
        remainingWeight += w;
      }
    }
    if (remainingWeight === 0) return null;
    return ((5 - earned) * 100) / remainingWeight;
  }

  function getMatriculaInfo(subject) {
    // Agrupa per sigla i ordena per quatri. La mes antiga = 1a matricula
    const sigla = (subject.sigla || subject.name || '').trim().toUpperCase();
    if (!sigla) return { num: 1, total: 1 };
    const sameGroup = state.subjects.filter(s => ((s.sigla || s.name || '').trim().toUpperCase()) === sigla);
    if (sameGroup.length <= 1) return { num: 1, total: 1 };
    // Ordenar per quatri (mes antic primer)
    const sorted = [...sameGroup].sort((a, b) => QUATRIS.indexOf(b.quatri) - QUATRIS.indexOf(a.quatri));
    const idx = sorted.findIndex(s => s.id === subject.id);
    return { num: idx + 1, total: sameGroup.length };
  }

  // Per a una sigla, retorna l'assignatura que aporta ECTS (la primera aprovada o compensable)
  // Si cap aprovada, retorna null
  function getEctsContributor(sigla) {
    if (!sigla) return null;
    const sig = sigla.trim().toUpperCase();
    const group = state.subjects.filter(s => ((s.sigla || s.name || '').trim().toUpperCase()) === sig);
    if (group.length === 0) return null;
    // Ordenat per quatri antic -> nou
    const sorted = [...group].sort((a, b) => QUATRIS.indexOf(b.quatri) - QUATRIS.indexOf(a.quatri));
    // Trobar la primera aprovada/compensable
    for (const s of sorted) {
      const st = getStatus(s);
      if (st.final && (st.type === 'pass' || st.type === 'compensable')) return s;
    }
    return null;
  }

  function getStatus(subject) {
    const g = calcGrade(subject);
    const needed = calcNeededPerPart(subject);
    if (g !== null && needed === null) {
      if (g >= 5) return { final: true, grade: g, type: 'pass' };
      if (g >= 4) return { final: true, grade: g, type: 'compensable' };
      return { final: true, grade: g, type: 'fail' };
    }
    if (needed === null) return { final: false, needed: null };
    if (needed <= 0) return { final: false, secured: true };
    if (needed > 10) return { final: false, impossible: true, needed };
    return { final: false, needed };
  }

  function getStatusType(subject) {
    const st = getStatus(subject);
    if (!st.final) return 'none';
    return st.type;
  }

  function renderFilters() {
    const bar = document.getElementById('filter-bar');
    const usedQuatris = [...new Set(state.subjects.map(s => s.quatri))].sort((a,b) => QUATRIS.indexOf(a) - QUATRIS.indexOf(b));
    let html = '<button class="filter-chip ' + (activeFilter === 'ALL' ? 'active' : '') + '" onclick="setFilter(\'ALL\')">Totes</button>';
    usedQuatris.forEach(q => {
      html += '<button class="filter-chip ' + (activeFilter === q ? 'active' : '') + '" onclick="setFilter(\'' + q + '\')">' + q + '</button>';
    });
    bar.innerHTML = html;
  }

  window.setFilter = function(f) {
    activeFilter = f;
    saveFilter();
    renderFilters();
    render();
    if (activePage === 'stats') renderStats();
  };

  window.toggleReorder = function() {
    reorderMode = !reorderMode;
    const btn = document.getElementById('reorder-btn');
    if (btn) btn.classList.toggle('active', reorderMode);
    const root = document.getElementById('reorder-banner-root');
    root.innerHTML = reorderMode
      ? '<div class="reorder-banner"><span><i class="ti ti-info-circle"></i> Mode reordenar actiu. Arrossega les targetes per moure-les.</span><button class="btn-ghost" onclick="toggleReorder()" style="color:inherit;"><i class="ti ti-check"></i>Fet</button></div>'
      : '';
    if (reorderMode) expandedId = null;
    render();
  };

  function getFiltered() {
    if (activeFilter === 'ALL') return state.subjects;
    return state.subjects.filter(s => s.quatri === activeFilter);
  }

  function render() {
    const grid = document.getElementById('grid');
    const filtered = getFiltered();
    if (state.subjects.length === 0) {
      grid.innerHTML = '<div class="grid-empty">Encara no tens cap assignatura.<br>Comença afegint-ne una.</div>';
      document.getElementById('overall').textContent = '—';
      return;
    }
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="grid-empty">No hi ha assignatures en aquest filtre.</div>';
      return;
    }
    let validGrades = [], passing = 0;
    const newStatus = {};

    grid.innerHTML = filtered.map(s => {
      const color = getColor(s.color);
      const g = calcGrade(s);
      const status = getStatus(s);
      const statusType = getStatusType(s);
      newStatus[s.id] = statusType;
      const justPassed = !firstRender && statusType === 'pass' && prevStatus[s.id] !== 'pass';
      const justFailed = !firstRender && statusType === 'fail' && prevStatus[s.id] !== 'fail';
      // Mitjana nomes amb assignatures finalitzades
      if (g !== null && status.final) { validGrades.push(g); if (g >= 5) passing++; }
      const gradeText = g === null ? '—' : fmt(g);
      const neededPart = calcNeededPerPart(s);

      let statusClass = 'status-pill', statusContent = '';
      if (status.final) {
        if (status.type === 'pass') {
          statusClass += ' status-pass';
          statusContent = '<i class="ti ti-check"></i> Aprovat amb <strong>' + fmt(status.grade) + '</strong>';
        } else if (status.type === 'compensable') {
          statusClass += ' status-compensable';
          statusContent = '<i class="ti ti-scale"></i> Compensable amb <strong>' + fmt(status.grade) + '</strong>';
        } else {
          statusClass += ' status-fail';
          statusContent = '<i class="ti ti-x"></i> Suspès amb <strong>' + fmt(status.grade) + '</strong>';
        }
      } else if (status.secured) {
        statusClass += ' status-pass';
        statusContent = '<i class="ti ti-check"></i> Ja tens prou per aprovar';
      } else if (status.impossible) {
        statusClass += ' status-fail';
        statusContent = '<i class="ti ti-alert-triangle"></i> Inaccessible amb el que queda';
      } else if (status.needed !== null) {
        statusClass += ' status-warn';
        statusContent = '<i class="ti ti-target"></i> Encara aprovable';
      } else {
        statusClass += ' status-warn';
        statusContent = '<i class="ti ti-pencil"></i> Sense notes';
      }

      // Collapsed view: parts as pills (max 4 visible; if more, show 3 + "+N more")
      const activeParts = getActiveParts(s);
      const MAX_VISIBLE = 4;
      const totalParts = activeParts.length;
      let visibleParts, hiddenCount;
      if (totalParts <= MAX_VISIBLE) {
        visibleParts = activeParts;
        hiddenCount = 0;
      } else {
        visibleParts = activeParts.slice(0, MAX_VISIBLE - 1);
        hiddenCount = totalParts - (MAX_VISIBLE - 1);
      }
      let collapsedPartsHtml = visibleParts.map(p => {
        const hasGrade = p.grade !== null && p.grade !== undefined && p.grade !== '';
        const cls = hasGrade ? 'collapsed-part' : 'collapsed-part empty';
        const val = hasGrade ? fmt(parseFloat(p.grade)) : '–';
        return '<div class="' + cls + '">' +
          '<div class="collapsed-part-name" title="' + escapeHtml(p.name) + '">' + escapeHtml(p.name) + '</div>' +
          '<div class="collapsed-part-grade">' + val + '</div>' +
        '</div>';
      }).join('');
      if (hiddenCount > 0) {
        collapsedPartsHtml += '<div class="collapsed-more">+' + hiddenCount + '<strong>més</strong></div>';
      }

      // Expanded view: editable parts
      const partsHtml = activeParts.map(p => {
        const hasGrade = p.grade !== null && p.grade !== undefined && p.grade !== '';
        const showHint = !hasGrade && neededPart !== null && neededPart > 0 && neededPart <= 10;
        const hintValue = showHint ? fmt(neededPart) : '';
        return '<div class="part">' +
          '<span class="part-name" title="' + escapeHtml(p.name) + '">' + escapeHtml(p.name) + '</span>' +
          '<div class="input-wrapper">' +
            '<input type="text" inputmode="decimal" placeholder=" " value="' + (hasGrade ? p.grade : '') + '" data-subject="' + s.id + '" data-part="' + p.id + '" oninput="onGradeInput(event)" onblur="onGradeBlur(event)" onclick="event.stopPropagation()" />' +
            (showHint ? '<span class="ghost-hint">' + hintValue + '</span>' : '') +
          '</div>' +
          '<span class="part-weight">' + fmt(parseFloat(p.weight) || 0) + '%</span>' +
        '</div>';
      }).join('');

      let earned = 0, pending = 0;
      activeParts.forEach(p => {
        const w = parseFloat(p.weight) || 0;
        if (p.grade !== null && p.grade !== undefined && p.grade !== '') {
          earned += (parseFloat(p.grade) * w) / 100;
        } else {
          pending += w;
        }
      });
      const detailsHtml = '<div class="card-details">' +
        '<div class="detail-row"><span>Nota acumulada</span><strong>' + fmt(earned) + '</strong></div>' +
        '<div class="detail-row"><span>Pes ja avaluat</span><strong>' + fmt(100 - pending) + '%</strong></div>' +
        '<div class="detail-row"><span>Pes pendent</span><strong>' + fmt(pending) + '%</strong></div>' +
        (neededPart !== null && neededPart > 0 && neededPart <= 10
          ? '<div class="detail-row"><span>Necessites per aprovar</span><strong>' + fmt(neededPart) + '</strong></div>'
          : '') +
      '</div>';

      const expandedClass = expandedId === s.id ? ' expanded' : '';
      let animClass = '';
      if (justPassed) animClass = ' passed-anim';
      else if (justFailed) animClass = ' failed-anim';
      const reorderClass = reorderMode ? ' reorder-mode' : '';
      const dragAttrs = reorderMode ? 'draggable="true" ondragstart="onDragStart(event,\'' + s.id + '\')" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,\'' + s.id + '\')" ondragend="onDragEnd(event)"' : '';
      const clickHandler = reorderMode ? '' : 'onclick="toggleExpand(\'' + s.id + '\')"';

      // Info de matricula
      const matricula = getMatriculaInfo(s);
      const matSuffix = ['', '1a', '2a', '3a', '4a', '5a', '6a'][matricula.num] || (matricula.num + 'a');
      const matCls = matricula.num === 1 ? 'card-matricula first' : 'card-matricula';
      const matriculaHtml = matricula.total > 1 || matricula.num > 1
        ? '<span class="' + matCls + '"><i class="ti ti-bookmark"></i>' + matSuffix + ' matrícula</span>'
        : '';

      // Selector d'avaluacio (nomes si te mes d'una)
      let evalSelectorHtml = '';
      if (s.evaluations && s.evaluations.length > 1) {
        const opts = s.evaluations.map(ev =>
          '<option value="' + ev.id + '"' + (ev.id === s.activeEval ? ' selected' : '') + '>' + escapeHtml(ev.name) + '</option>'
        ).join('');
        evalSelectorHtml = '<div class="eval-selector" onclick="event.stopPropagation()">' +
          '<label><i class="ti ti-list-check"></i> Avaluació</label>' +
          '<select onchange="switchSubjectEval(\'' + s.id + '\', this.value)">' + opts + '</select>' +
        '</div>';
      }

      // Badge d'estat final
      let badgeHtml = '';
      if (status.final) {
        if (status.type === 'pass') {
          badgeHtml = '<span class="card-badge badge-pass"><i class="ti ti-check"></i>Aprovada</span>';
        } else if (status.type === 'compensable') {
          badgeHtml = '<span class="card-badge badge-compensable"><i class="ti ti-scale"></i>Compensable</span>';
        } else if (status.type === 'fail') {
          badgeHtml = '<span class="card-badge badge-fail"><i class="ti ti-x"></i>Suspesa</span>';
        }
      }

      const isExpanded = expandedId === s.id;
      const sigla = s.sigla || s.name || '';
      const displayName = isExpanded && s.fullName ? sigla + ' — ' + s.fullName : sigla;
      return '<div class="card' + expandedClass + animClass + reorderClass + '" data-card-id="' + s.id + '" ' + dragAttrs + ' ' + clickHandler + '>' +
        '<div class="card-banner" style="background:' + color.bg + ';color:#ffffff;">' +
          '<div class="card-header-text">' +
            '<h3 class="card-name" style="color:#ffffff;">' + escapeHtml(displayName) + '</h3>' +
            '<span class="card-quatri">' + escapeHtml(s.quatri || '') + '</span>' +
            (matriculaHtml) +
          '</div>' +
          '<span class="card-grade" style="color:#ffffff;">' + gradeText + '</span>' +
        '</div>' +
        badgeHtml +
        evalSelectorHtml +
        '<div class="collapsed-parts">' + collapsedPartsHtml + '</div>' +
        '<div class="card-body" onclick="event.stopPropagation()">' +
          '<div class="parts">' + partsHtml + '</div>' +
          '<div class="' + statusClass + '">' + statusContent + '</div>' +
          detailsHtml +
          '<div class="card-actions">' +
            '<button class="icon-btn" onclick="event.stopPropagation();openModal(\'' + s.id + '\')" aria-label="Editar"><i class="ti ti-edit"></i></button>' +
            '<button class="icon-btn" onclick="event.stopPropagation();deleteSubject(\'' + s.id + '\')" aria-label="Eliminar"><i class="ti ti-trash"></i></button>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    prevStatus = newStatus;
    firstRender = false;

    if (validGrades.length > 0) {
      const avg = validGrades.reduce((a,b)=>a+b,0) / validGrades.length;
      const scope = activeFilter === 'ALL' ? state.subjects.length : filtered.length;
      document.getElementById('overall').innerHTML =
        '<div class="stats"><span class="stat">Mitjana <strong>' + fmt(avg) + '</strong></span>' +
        '<span class="stat">Aprovades <strong>' + passing + '/' + scope + '</strong></span></div>';
    } else {
      document.getElementById('overall').textContent = state.subjects.length + ' assignatures · sense notes encara';
    }
    renderDashboard();
  }

  function renderDashboard() {
    const filtered = getFiltered();
    const dash = document.getElementById('dashboard');
    if (state.subjects.length === 0) { dash.innerHTML = ''; return; }

    let total = filtered.length, passed = 0, pending = 0;
    let grades = [];

    filtered.forEach(s => {
      const g = calcGrade(s);
      const status = getStatus(s);
      if (g !== null && status.final) grades.push(g);
      if (status.final) {
        if (status.type === 'pass' || status.type === 'compensable') passed++;
      } else {
        pending++;
      }
    });

    // ECTS sense doble compte: agrupar per sigla i comptar nomes 1 vegada
    const seenSiglas = new Set();
    let totalEcts = 0, passedEcts = 0;
    filtered.forEach(s => {
      const sig = (s.sigla || s.name || '').trim().toUpperCase();
      if (sig && seenSiglas.has(sig)) return; // ja comptat
      if (sig) seenSiglas.add(sig);
      const ects = parseFloat(s.ects) || 0;
      totalEcts += ects;
      // Per ECTS aprovats: si alguna de les matricules d'aquesta sigla ha aprovat, sumar ects
      const contributor = sig ? getEctsContributor(sig) : (getStatus(s).type === 'pass' || getStatus(s).type === 'compensable' ? s : null);
      if (contributor) passedEcts += ects;
    });

    // Detectar si hi ha assignatures repetides
    const siglaCounts = {};
    state.subjects.forEach(s => {
      const sig = (s.sigla || s.name || '').trim().toUpperCase();
      if (!sig) return;
      siglaCounts[sig] = (siglaCounts[sig] || 0) + 1;
    });
    const repeatedSiglas = Object.keys(siglaCounts).filter(sig => siglaCounts[sig] > 1);
    const hasRepeated = repeatedSiglas.length > 0;

    // Aprovades a 1a matricula: nomes calculat si hi ha repetides
    let firstTryPassed = 0, firstTryTotal = 0, firstTryPct = 0;
    if (hasRepeated) {
      // Per a cada sigla en filtered: si la 1a matricula ja t status final i va aprovar -> conta
      const siglasInFilter = new Set();
      filtered.forEach(s => {
        const sig = (s.sigla || s.name || '').trim().toUpperCase();
        if (sig) siglasInFilter.add(sig);
      });
      siglasInFilter.forEach(sig => {
        const group = state.subjects.filter(s => ((s.sigla || s.name || '').trim().toUpperCase()) === sig);
        if (group.length === 0) return;
        // Ordenar per quatri (mes antic primer)
        const sorted = [...group].sort((a, b) => QUATRIS.indexOf(b.quatri) - QUATRIS.indexOf(a.quatri));
        const firstAttempt = sorted[0];
        const st = getStatus(firstAttempt);
        if (st.final) {
          firstTryTotal++;
          if (st.type === 'pass' || st.type === 'compensable') firstTryPassed++;
        }
      });
      firstTryPct = firstTryTotal > 0 ? Math.round((firstTryPassed / firstTryTotal) * 100) : 0;
    }

    const avg = grades.length > 0 ? grades.reduce((a,b)=>a+b,0) / grades.length : null;
    const avgText = avg !== null ? fmt(avg) : '—';
    const avgClass = avg === null ? '' : (avg >= 5 ? ' accent-pass' : ' accent-fail');
    const fmtEcts = (n) => { const r = Math.round(n * 10) / 10; return r % 1 === 0 ? String(r) : r.toFixed(1); };

    let cards = '';
    cards += '<div class="metric-card' + avgClass + '">' +
        '<div class="metric-label"><i class="ti ti-chart-line"></i>Mitjana</div>' +
        '<div class="metric-value">' + avgText + '</div>' +
        '<div class="metric-subvalue">' + grades.length + ' finalitzades</div>' +
      '</div>';
    cards += '<div class="metric-card accent-pass">' +
        '<div class="metric-label"><i class="ti ti-school"></i>ECTS aprovats</div>' +
        '<div class="metric-value">' + fmtEcts(passedEcts) + '<span style="font-size:16px;color:var(--text-tertiary);font-weight:500;"> / ' + fmtEcts(totalEcts) + '</span></div>' +
        '<div class="metric-subvalue">' + (totalEcts > 0 ? Math.round(passedEcts/totalEcts*100) : 0) + '% del total</div>' +
      '</div>';
    cards += '<div class="metric-card accent-pass">' +
        '<div class="metric-label"><i class="ti ti-circle-check"></i>Aprovades</div>' +
        '<div class="metric-value">' + passed + '<span style="font-size:16px;color:var(--text-tertiary);font-weight:500;"> / ' + total + '</span></div>' +
        '<div class="metric-subvalue">' + (total > 0 ? Math.round(passed/total*100) : 0) + '% del total</div>' +
      '</div>';
    if (hasRepeated) {
      cards += '<div class="metric-card accent-pass">' +
        '<div class="metric-label"><i class="ti ti-medal"></i>1a matrícula</div>' +
        '<div class="metric-value">' + firstTryPct + '%<span style="font-size:16px;color:var(--text-tertiary);font-weight:500;"></span></div>' +
        '<div class="metric-subvalue">' + firstTryPassed + ' de ' + firstTryTotal + ' aprovades</div>' +
      '</div>';
    } else {
      cards += '<div class="metric-card accent-warn">' +
        '<div class="metric-label"><i class="ti ti-clock"></i>Pendents</div>' +
        '<div class="metric-value">' + pending + '</div>' +
        '<div class="metric-subvalue">sense totes les notes</div>' +
      '</div>';
    }

    // Countdown: 3 events mes propers
    const today = new Date();
    const todayMid = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    const upcomingEvents = state.events
      .filter(ev => new Date(ev.date + 'T00:00:00') >= todayMid)
      .sort((a, b) => a.date.localeCompare(b.date))
      .slice(0, 3);

    if (state.events && state.events.length > 0) {
      let countdownContent = '';
      if (upcomingEvents.length === 0) {
        countdownContent = '<div class="countdown-empty">Cap event proper</div>';
      } else {
        countdownContent = '<div class="countdown-events">' + upcomingEvents.map(ev => {
          const evDate = new Date(ev.date + 'T00:00:00');
          const days = daysBetween(todayMid, evDate);
          let label, cls = '';
          if (days === 0) { label = 'AVUI'; cls = 'today'; }
          else if (days <= 3) { label = days + 'd'; cls = 'urgent'; }
          else if (days <= 7) { label = days + 'd'; cls = 'soon'; }
          else { label = days + 'd'; }
          const subject = ev.subjectId ? state.subjects.find(s => s.id === ev.subjectId) : null;
          const subj = subject ? ' (' + (subject.sigla || subject.name || '') + ')' : '';
          const type = getEventType(ev.type);
          return '<div class="countdown-event" onclick="switchPage(\'calendar\');" style="cursor:pointer;">' +
            '<span class="countdown-event-name"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:' + type.color + ';margin-right:6px;vertical-align:middle;"></span>' + escapeHtml((ev.title || type.label) + subj) + '</span>' +
            '<span class="countdown-event-days ' + cls + '">' + label + '</span>' +
          '</div>';
        }).join('') + '</div>';
      }
      cards += '<div class="countdown-card">' +
        '<div class="countdown-title"><i class="ti ti-calendar-time"></i>Propers events</div>' +
        countdownContent +
      '</div>';
    }

    dash.innerHTML = cards;
  }

  window.switchSubjectEval = function(subjectId, evalId) {
    const s = state.subjects.find(x => x.id === subjectId);
    if (!s) return;
    s.activeEval = evalId;
    save();
    render();
  };

  window.toggleExpand = function(subjectId) {
    if (reorderMode) return;
    expandedId = expandedId === subjectId ? null : subjectId;
    render();
  };

  window.onGradeInput = function(ev) {
    const inp = ev.target;
    const sId = inp.dataset.subject;
    const pId = inp.dataset.part;
    const value = inp.value;
    const s = state.subjects.find(x => x.id === sId);
    if (!s) return;
    const activeParts = getActiveParts(s);
    const p = activeParts.find(x => x.id === pId);
    if (!p) return;
    if (value === '' || value === null) {
      p.grade = null;
      save();
      return;
    }
    if (!/^-?\d*[.,]?\d*$/.test(value)) {
      inp.value = value.slice(0, -1);
      return;
    }
    if (value.endsWith('.') || value.endsWith(',')) return;
    const v = parseNum(value);
    if (v === null) return;
    p.grade = Math.max(0, Math.min(10, v));
    save();
    updateCardLive(sId);
  };

  window.onGradeBlur = function(ev) {
    const sId = ev.target.dataset.subject;
    const s = state.subjects.find(x => x.id === sId);
    if (!s) return;
    const pId = ev.target.dataset.part;
    const activeParts = getActiveParts(s);
    const p = activeParts.find(x => x.id === pId);
    if (p && ev.target.value !== '' && (ev.target.value.endsWith('.') || ev.target.value.endsWith(','))) {
      const v = parseNum(ev.target.value);
      if (v !== null) p.grade = Math.max(0, Math.min(10, v));
      save();
    }
    render();
  };

  function updateCardLive(subjectId) {
    const s = state.subjects.find(x => x.id === subjectId);
    if (!s) return;
    const card = document.querySelector('[data-card-id="' + subjectId + '"]');
    if (!card) return;
    const g = calcGrade(s);
    const gradeEl = card.querySelector('.card-grade');
    if (gradeEl) gradeEl.textContent = g === null ? '—' : fmt(g);

    let validGrades = [], passing = 0;
    state.subjects.forEach(sub => {
      const sg = calcGrade(sub);
      const sst = getStatus(sub);
      if (sg !== null && sst.final) {
        validGrades.push(sg);
        if (sg >= 5) passing++;
      }
    });
    if (validGrades.length > 0) {
      const avg = validGrades.reduce((a,b)=>a+b,0) / validGrades.length;
      const filtered = getFiltered();
      const scope = activeFilter === 'ALL' ? state.subjects.length : filtered.length;
      document.getElementById('overall').innerHTML =
        '<div class="stats"><span class="stat">Mitjana <strong>' + fmt(avg) + '</strong></span>' +
        '<span class="stat">Aprovades <strong>' + passing + '/' + scope + '</strong></span></div>';
    }
  }

  window.deleteSubject = function(subjectId) {
    if (!confirm('Vols eliminar aquesta assignatura?')) return;
    state.subjects = state.subjects.filter(s => s.id !== subjectId);
    if (expandedId === subjectId) expandedId = null;
    save(); renderFilters(); render();
  };

  window.onDragStart = function(ev, id) {
    if (!reorderMode) return;
    dragSrcId = id;
    ev.dataTransfer.effectAllowed = 'move';
    ev.currentTarget.classList.add('dragging');
  };
  window.onDragOver = function(ev) {
    if (!reorderMode || !dragSrcId) return;
    ev.preventDefault();
    ev.dataTransfer.dropEffect = 'move';
    ev.currentTarget.classList.add('drag-over');
  };
  window.onDragLeave = function(ev) {
    ev.currentTarget.classList.remove('drag-over');
  };
  window.onDrop = function(ev, targetId) {
    ev.preventDefault();
    ev.currentTarget.classList.remove('drag-over');
    if (!dragSrcId || dragSrcId === targetId) return;
    const srcIdx = state.subjects.findIndex(s => s.id === dragSrcId);
    const tgtIdx = state.subjects.findIndex(s => s.id === targetId);
    if (srcIdx === -1 || tgtIdx === -1) return;
    const [moved] = state.subjects.splice(srcIdx, 1);
    state.subjects.splice(tgtIdx, 0, moved);
    save(); render();
  };
  window.onDragEnd = function(ev) {
    ev.currentTarget.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragSrcId = null;
  };

  window.openModal = function(subjectId) {
    editingId = subjectId || null;
    if (editingId) {
      draft = JSON.parse(JSON.stringify(state.subjects.find(x => x.id === editingId)));
    } else {
      const usedColors = state.subjects.map(x => x.color);
      const freeColor = PALETTE.find(p => !usedColors.includes(p.name)) || PALETTE[state.subjects.length % PALETTE.length];
      const defaultQuatri = (activeFilter !== 'ALL' && QUATRIS.includes(activeFilter)) ? activeFilter : '25-26 Q2';
      const firstEvalId = genId();
      draft = { id: genId(), sigla: '', fullName: '', color: freeColor.name, quatri: defaultQuatri, ects: 6,
        evaluations: [{ id: firstEvalId, name: 'Avaluació', parts: [{ id: genId(), name: '', weight: 100, grade: null }] }],
        activeEval: firstEvalId };
    }
    renderModal();
  };

  let modalActiveEval = null;

  function renderEvalTabs() {
    const container = document.getElementById('modal-eval-tabs');
    if (!container) return;
    const html = draft.evaluations.map(ev => {
      const cls = ev.id === modalActiveEval ? 'eval-tab active' : 'eval-tab';
      return '<button type="button" class="' + cls + '" onclick="switchModalEval(\'' + ev.id + '\')">' +
        '<span class="eval-tab-name">' + escapeHtml(ev.name) + '</span>' +
        (draft.evaluations.length > 1 ? '<span class="eval-tab-del" onclick="event.stopPropagation();removeEvaluation(\'' + ev.id + '\')" title="Eliminar avaluació"><i class="ti ti-x"></i></span>' : '') +
      '</button>';
    }).join('');
    container.innerHTML = html +
      '<button type="button" class="eval-tab-add" onclick="addEvaluation()" title="Afegir avaluació"><i class="ti ti-plus"></i></button>';
  }

  function renderEvalContent() {
    const currentEval = draft.evaluations.find(e => e.id === modalActiveEval);
    if (!currentEval) return;
    const nameInput = document.getElementById('modal-eval-name');
    if (nameInput && document.activeElement !== nameInput) nameInput.value = currentEval.name;
    const partsContainer = document.getElementById('parts-edit');
    if (!partsContainer) return;
    partsContainer.innerHTML = currentEval.parts.map(p =>
      '<div class="part-edit">' +
        '<input type="text" placeholder="Nom (ex. Examen final)" value="' + escapeHtml(p.name) + '" data-part-id="' + p.id + '" data-field="name" />' +
        '<input type="number" placeholder="%" min="0" max="100" step="0.1" value="' + p.weight + '" data-part-id="' + p.id + '" data-field="weight" />' +
        '<button class="icon-btn" onclick="removePart(\'' + p.id + '\')" aria-label="Eliminar"><i class="ti ti-x"></i></button>' +
      '</div>'
    ).join('');
    updateWarn();
    syncDraftInputs();
  }

  function updateWarn() {
    const currentEval = draft.evaluations.find(e => e.id === modalActiveEval);
    if (!currentEval) return;
    const totalW = currentEval.parts.reduce((a,p) => a + (parseFloat(p.weight) || 0), 0);
    const warnContainer = document.getElementById('warn-root');
    if (!warnContainer) return;
    warnContainer.innerHTML = totalW < 100 ? '<div class="warn">⚠ La suma dels percentatges és ' + fmt(totalW) + '% (ha de ser ≥ 100%)</div>' : '';
  }

  function renderModal() {
    const root = document.getElementById('modal-root');
    if (!modalActiveEval || !draft.evaluations.find(e => e.id === modalActiveEval)) {
      modalActiveEval = draft.evaluations[0].id;
    }
    const currentEval = draft.evaluations.find(e => e.id === modalActiveEval);
    const quatriOptions = QUATRIS.map(q =>
      '<option value="' + q + '" ' + (q === draft.quatri ? 'selected' : '') + '>' + q + '</option>'
    ).join('');

    root.innerHTML =
      '<div class="modal-bg" onclick="if(event.target===this)closeModal()">' +
        '<div class="modal">' +
          '<h3>' + (editingId ? 'Editar assignatura' : 'Nova assignatura') + '</h3>' +
          '<div><label>Sigla <span style="color:var(--accent-dark);">*</span></label>' +
            '<input type="text" id="modal-sigla" value="' + escapeHtml(draft.sigla || '') + '" placeholder="Ex. SO" maxlength="12" /></div>' +
          '<div><label>Nom complet <span style="color:var(--text-tertiary);font-weight:400;">(opcional)</span></label>' +
            '<input type="text" id="modal-fullname" value="' + escapeHtml(draft.fullName || '') + '" placeholder="Ex. Sistemes Operatius" /></div>' +
          '<div><label>Quatrimestre</label>' +
            '<select id="modal-quatri">' + quatriOptions + '</select></div>' +
          '<div><label>ECTS</label>' +
            '<input type="number" id="modal-ects" value="' + (draft.ects || 6) + '" min="0" max="60" step="0.5" /></div>' +
          '<div><label>Color</label><div id="modal-color-picker"></div></div>' +
          '<div><label>Tipus d\'avaluació</label>' +
            '<div class="eval-tabs" id="modal-eval-tabs"></div>' +
          '</div>' +
          '<div class="eval-name-row">' +
            '<label>Nom de l\'avaluació</label>' +
            '<input type="text" id="modal-eval-name" value="' + escapeHtml(currentEval.name) + '" oninput="renameEvaluation(this.value)" placeholder="Ex. Continuada / Final" />' +
          '</div>' +
          '<div><label>Apartats i percentatges</label>' +
            '<div class="parts-edit" id="parts-edit"></div>' +
            '<button class="btn-ghost" onclick="addPart()" style="margin-top:6px;"><i class="ti ti-plus"></i>Afegir apartat</button>' +
            '<div id="warn-root"></div>' +
          '</div>' +
          '<div class="modal-actions">' +
            '<button class="btn" onclick="closeModal()">Cancel·lar</button>' +
            '<button class="btn btn-primary" onclick="saveModal()">Desar</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    renderEvalTabs();
    renderEvalContent();
    renderColorPicker();
  }

  function syncDraftInputs() {
    document.querySelectorAll('.part-edit input').forEach(inp => {
      inp.addEventListener('input', function() {
        const pid = this.dataset.partId;
        const f = this.dataset.field;
        const ev = draft.evaluations.find(e => e.id === modalActiveEval);
        if (!ev) return;
        const p = ev.parts.find(x => x.id === pid);
        if (p) {
          if (f === 'weight') p.weight = parseFloat(this.value) || 0;
          else p[f] = this.value;
        }
        updateWarn();
      });
    });
  }

  window.selectColor = function(name) {
    draft.color = name;
    renderColorPicker();
  };

  function renderColorPicker() {
    const container = document.getElementById('modal-color-picker');
    if (!container) return;
    const isCustom = !PALETTE.find(p => p.name === draft.color);
    const swatchesHtml = PALETTE.map(p =>
      '<div class="color-swatch ' + (p.name === draft.color ? 'selected' : '') + '" style="background:' + p.bg + ';" data-color="' + p.name + '" onclick="selectColor(\'' + p.name + '\')"></div>'
    ).join('') +
      '<div class="color-swatch custom ' + (isCustom ? 'selected' : '') + '" onclick="document.getElementById(\'modal-custom-color\').click()" title="Color personalitzat"></div>';
    const customValue = isCustom ? draft.color : '#0EBB80';
    container.innerHTML = '<div class="color-picker">' + swatchesHtml + '</div>' +
      (isCustom ? '<div class="color-custom-row"><input type="color" id="modal-custom-color" value="' + customValue + '" oninput="selectCustomColor(this.value)" /><label>Color personalitzat: ' + customValue.toUpperCase() + '</label></div>' :
       '<input type="color" id="modal-custom-color" value="' + customValue + '" oninput="selectCustomColor(this.value)" style="display:none;" />');
  }

  function captureModalFields() {
    // Conservar valors actuals dels camps abans de re-renderitzar tot el modal
    const sigla = document.getElementById('modal-sigla');
    const fullname = document.getElementById('modal-fullname');
    const quatri = document.getElementById('modal-quatri');
    const ects = document.getElementById('modal-ects');
    if (sigla) draft.sigla = sigla.value;
    if (fullname) draft.fullName = fullname.value;
    if (quatri) draft.quatri = quatri.value;
    if (ects) draft.ects = parseFloat(ects.value) || 6;

    const ev = draft.evaluations.find(e => e.id === modalActiveEval);
    if (ev) ev.parts.push({ id: genId(), name: '', weight: 0, grade: null });
    renderEvalContent();
  };
  window.removePart = function(pid) {
    const ev = draft.evaluations.find(e => e.id === modalActiveEval);
    if (ev) ev.parts = ev.parts.filter(p => p.id !== pid);
    renderEvalContent();
  };
  window.switchModalEval = function(eid) {
    captureModalFields();
    modalActiveEval = eid;
    renderEvalTabs();
    renderEvalContent();
    renderColorPicker();
  };
  window.addEvaluation = function() {
    captureModalFields();
    const newId = genId();
    const num = draft.evaluations.length + 1;
    draft.evaluations.push({ id: newId, name: 'Avaluació ' + num, parts: [{ id: genId(), name: '', weight: 100, grade: null }] });
    modalActiveEval = newId;
    renderEvalTabs();
    renderEvalContent();
    renderColorPicker();
  };
  window.removeEvaluation = function(eid) {
    if (draft.evaluations.length <= 1) { alert('Ha d\'haver-hi com a mínim una avaluació'); return; }
    if (!confirm('Eliminar aquesta avaluació i les seves notes?')) return;
    captureModalFields();
    draft.evaluations = draft.evaluations.filter(e => e.id !== eid);
    if (modalActiveEval === eid) modalActiveEval = draft.evaluations[0].id;
    if (draft.activeEval === eid) draft.activeEval = draft.evaluations[0].id;
    renderEvalTabs();
    renderEvalContent();
    renderColorPicker();
  };
  window.renameEvaluation = function(newName) {
    const ev = draft.evaluations.find(e => e.id === modalActiveEval);
    if (ev) ev.name = newName;
    renderEvalTabs(); // Nomes refrescar les tabs perqu mostrin el nou nom
  };
  window.selectCustomColor = function(hexValue) {
    draft.color = hexValue;
    renderColorPicker();

  window.closeModal = function() {
    document.getElementById('modal-root').innerHTML = '';
    draft = null; editingId = null; modalActiveEval = null;
  };
  window.saveModal = function() {
    const s = draft;
    const siglaInput = document.getElementById('modal-sigla');
    s.sigla = siglaInput.value.trim();
    if (!s.sigla) { alert("La sigla és obligatòria"); return; }
    const fnInput = document.getElementById('modal-fullname');
    s.fullName = fnInput.value.trim();
    const qInput = document.getElementById('modal-quatri');
    s.quatri = qInput.value;
    const eInput = document.getElementById('modal-ects');
    s.ects = parseFloat(eInput.value) || 6;
    // Validar totes les avaluacions
    for (const ev of s.evaluations) {
      if (ev.parts.length === 0) { alert("Cada avaluació ha de tenir com a mínim un apartat (" + ev.name + ")"); return; }
      const tw = ev.parts.reduce((a,p) => a + (parseFloat(p.weight) || 0), 0);
      if (tw < 100) {
        if (!confirm('La suma de "' + ev.name + '" és ' + fmt(tw) + '%. Vols desar igualment?')) return;
      }
    }
    // Conservar notes existents per ID de part
    if (editingId) {
      const idx = state.subjects.findIndex(x => x.id === editingId);
      if (idx >= 0) {
        const existing = state.subjects[idx];
        const existingEvals = existing.evaluations || [];
        s.evaluations.forEach(newEv => {
          const oldEv = existingEvals.find(e => e.id === newEv.id);
          if (oldEv) {
            newEv.parts.forEach(np => {
              const oldP = oldEv.parts.find(op => op.id === np.id);
              if (oldP) np.grade = oldP.grade;
            });
          }
        });
        state.subjects[idx] = s;
      }
    } else {
      state.subjects.push(s);
    }
    save(); closeModal(); renderFilters(); render();
  };
